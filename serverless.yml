# yaml-language-server: $schema=.vscode/serverless.schema.json
service: async-task-processor

# Loads `.env` when present so `${env:...}` resolves for local runs (`sls offline`, `sls deploy` from a laptop).
# In CI for production, omit `.env` and set `IS_OFFLINE=false` (or rely on the default below).
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    TASKS_TABLE: tasks-${self:provider.stage}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
    SQS_ENDPOINT: ${env:SQS_ENDPOINT, ''}

plugins:
  - serverless-esbuild
  - serverless-dynamodb
  - serverless-offline-sqs
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
  serverless-dynamodb:
    start:
      port: 8000
      inMemory: true
      migrate: true
      noStart: true

  serverless-offline-sqs:
    autoCreate: false
    endpoint: ${env:SQS_ENDPOINT}
    region: ${self:provider.region}
    accessKeyId: ${env:AWS_ACCESS_KEY_ID, 'local'}
    secretAccessKey: ${env:AWS_SECRET_ACCESS_KEY, 'local'}

functions:
  submitTask:
    handler: src/handlers/submitTask.handler
    events:
      - http:
          path: /tasks
          method: post
          cors: true
    environment:
      TASK_QUEUE_URL:
        Ref: TaskQueue
      LOCAL_TASK_QUEUE_URL: ${env:LOCAL_TASK_QUEUE_URL, ''}

  processTask:
    handler: src/handlers/processTask.handler
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - TaskQueue
              - Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

  getTask:
    handler: src/handlers/getTask.handler
    events:
      - http:
          path: /tasks/{taskId}
          method: get
          cors: true

resources:
  Resources:
    TasksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: tasks-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: taskId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: taskId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    TaskDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: task-dlq-${self:provider.stage}

    TaskQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: task-queue-${self:provider.stage}
        VisibilityTimeout: 30
        RedrivePolicy:
          maxReceiveCount: 3
          deadLetterTargetArn:
            Fn::GetAtt:
              - TaskDLQ
              - Arn

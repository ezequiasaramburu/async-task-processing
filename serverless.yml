# yaml-language-server: $schema=.vscode/serverless.schema.json
service: async-task-processor

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    TASK_QUEUE_NAME: task-queue-${sls:stage}

plugins:
  - serverless-esbuild
  - serverless-dynamodb
  - serverless-offline-sqs
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
  serverless-dynamodb:
    start:
      port: 8000
      inMemory: true
      migrate: true
  serverless-offline-sqs:
    autoCreate: true
    endpoint: http://localhost:9324

functions:
  submitTask:
    handler: src/handlers/submitTask.handler
    events:
      - http:
          path: /tasks
          method: post
          cors: true
    environment:
      TASKS_TABLE:
        Ref: TasksTable
      TASK_QUEUE_URL:
        Ref: TaskQueue

  processTask:
    handler: src/handlers/processTask.handler
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - TaskQueue
              - Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures
    environment:
      TASKS_TABLE:
        Ref: TasksTable

resources:
  Resources:
    TasksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: tasks-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: taskId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: taskId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    TaskDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: task-dlq-${sls:stage}

    TaskQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: task-queue-${sls:stage}
        VisibilityTimeout: 30
        RedrivePolicy:
          maxReceiveCount: 3
          deadLetterTargetArn:
            Fn::GetAtt:
              - TaskDLQ
              - Arn
